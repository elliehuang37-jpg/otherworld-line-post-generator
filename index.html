<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4B0717">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="OL LINE 貼文">
  <title>歐樂沃 LINE 私域每日貼文生成器</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <style>
    :root {
      --rose: #CC5F83;
      --burgundy: #4B0717;
      --purple: #BD73BF;
      --electric: #4142E8;
      --sky: #78BBE8;
      --ink: #4B0717;
      --muted: #755e69;
      --line: #ead4df;
      --soft: #fff6fa;
      --sky-soft: #f1f9fe;
      --panel: #ffffff;
      --shadow: 0 16px 36px rgba(75, 7, 23, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: #fff;
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.55;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px clamp(16px, 4vw, 42px);
      color: #fff;
      background: var(--burgundy);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(120, 187, 232, 0.34), rgba(204, 95, 131, 0.24));
      font-weight: 900;
    }

    .brand-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      margin: 2px 0 0;
      color: rgba(255, 255, 255, 0.75);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(310px, 430px) minmax(0, 1fr);
      min-height: 0;
    }

    .control-rail {
      border-right: 1px solid var(--line);
      background: #fff;
      min-height: calc(100vh - 67px);
      overflow: auto;
    }

    .hero {
      min-height: 205px;
      padding: 28px 24px;
      color: var(--ink);
      background: linear-gradient(135deg, #fff 0%, #fff 62%, var(--sky-soft) 100%);
      border-bottom: 1px solid var(--line);
      border-left: 7px solid var(--rose);
      display: flex;
      align-items: flex-end;
    }

    .hero h1 {
      margin: 0;
      max-width: 370px;
      font-size: 28px;
      line-height: 1.16;
    }

    .hero p {
      margin: 10px 0 0;
      max-width: 380px;
      color: var(--muted);
      font-size: 14px;
    }

    .controls { padding: 18px; }

    .control-strategy {
      margin: 0 18px 18px;
    }

    .section {
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .section:first-child { padding-top: 0; }
    .section:last-child { border-bottom: 0; }

    .section-title {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .field {
      display: grid;
      gap: 7px;
      margin: 0 0 12px;
    }

    .field label {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    input, select, textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(204, 95, 131, 0.18);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--sky-soft);
    }

    .segmented button,
    .chip-row button,
    .action-btn,
    .ghost-btn,
    .mini-btn {
      min-height: 40px;
      border-radius: 8px;
      font-weight: 900;
      white-space: nowrap;
    }

    .segmented button,
    .chip-row button {
      border: 0;
      color: var(--ink);
      background: transparent;
      padding: 9px 7px;
    }

    .segmented button.active,
    .chip-row button.active {
      color: #fff;
      background: var(--burgundy);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip-row button {
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
    }

    .action-btn,
    .ghost-btn,
    .mini-btn {
      border: 1px solid transparent;
      padding: 9px 12px;
    }

    .action-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--electric), var(--purple));
    }

    .ghost-btn {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.08);
    }

    .mini-btn {
      color: var(--ink);
      border-color: var(--line);
      background: #fff;
    }

    .workspace {
      min-width: 0;
      padding: clamp(18px, 3vw, 34px);
      background: #fff;
      overflow: auto;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric {
      min-height: 90px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .metric::before {
      content: "";
      display: block;
      width: 42px;
      height: 4px;
      border-radius: 999px;
      margin-bottom: 9px;
      background: var(--burgundy);
    }

    .metric:nth-child(2)::before { background: var(--rose); }
    .metric:nth-child(3)::before { background: var(--electric); }
    .metric:nth-child(4)::before { background: var(--sky); }

    .metric b {
      display: block;
      color: var(--ink);
      font-size: 18px;
      line-height: 1.2;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .output-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      box-shadow: inset 6px 0 0 var(--rose);
    }

    .panel-head h2,
    .panel-head h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .post-preview {
      min-height: 390px;
      padding: 22px;
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.72;
    }

    .post-preview .empty {
      color: var(--muted);
      white-space: normal;
    }

    .insight-list {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .note {
      border-left: 4px solid var(--rose);
      padding: 10px 12px;
      color: var(--ink);
      background: var(--soft);
      border-radius: 6px;
      font-size: 14px;
    }

    .note strong {
      display: block;
      margin-bottom: 3px;
      color: inherit;
    }

    .note.blue {
      border-left-color: var(--sky);
      background: var(--sky-soft);
    }

    .note.purple {
      border-left-color: var(--purple);
      background: #fbf2fc;
    }

    .phone-preview-wrap {
      padding: 16px;
      background: #fff;
    }

    .phone-preview-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .phone-preview {
      width: min(360px, 100%);
      margin: 0 auto;
      border: 10px solid #2b1220;
      border-radius: 30px;
      background: #f5f5f7;
      box-shadow: 0 18px 40px rgba(75, 7, 23, 0.14);
      overflow: hidden;
    }

    .phone-preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 50px;
      padding: 0 16px;
      color: #fff;
      background: #06c755;
      font-size: 13px;
      font-weight: 900;
    }

    .phone-preview-body {
      min-height: 420px;
      padding: 14px;
      background: #edf3f8;
    }

    .line-bubble-preview {
      width: fit-content;
      max-width: 88%;
      padding: 12px 13px;
      border-radius: 4px 18px 18px 18px;
      color: #1f2933;
      background: #fff;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.58;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .sensitive-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .history-list {
      display: grid;
      gap: 8px;
      padding: 14px;
      max-height: 390px;
      overflow: auto;
    }

    .history-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px;
    }

    .history-item b {
      display: block;
      color: var(--burgundy);
      font-size: 13px;
      margin-bottom: 2px;
    }

    .history-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(30px);
      opacity: 0;
      pointer-events: none;
      transition: 180ms ease;
      color: #fff;
      background: rgba(75, 7, 23, 0.94);
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1040px) {
      .main-grid { grid-template-columns: 1fr; }
      .control-rail {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        min-height: auto;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0 20px;
      }
      .control-strategy {
        margin: 18px;
      }
      .section:last-child { border-bottom: 1px solid var(--line); }
      .output-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .topbar {
        position: static;
        align-items: flex-start;
        flex-direction: column;
      }
      .top-actions { justify-content: flex-start; }
      .brand-title { white-space: normal; }
      .hero { min-height: 180px; }
      .hero h1 { font-size: 24px; }
      .controls,
      .status-strip,
      .two-col {
        grid-template-columns: 1fr;
      }
      .post-preview {
        min-height: 320px;
        padding: 16px;
        font-size: 15px;
      }
      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }
      .panel-actions { justify-content: flex-start; }
      .phone-preview-body { min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-lockup">
        <div class="brand-mark">OL</div>
        <div>
          <p class="brand-title">歐樂沃 LINE 私域每日貼文生成器</p>
          <p class="brand-subtitle">拉新、養熟、轉化，一次產出可直接貼上的社群文案</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="ghost-btn" id="installBtn" hidden>安裝 App</button>
        <button class="ghost-btn" id="resetBtn">重設欄位</button>
      </div>
    </header>

    <main class="main-grid">
      <aside class="control-rail">
        <section class="hero">
          <div>
            <h1>每天 3 分鐘，產出一則有目的的 LINE 貼文</h1>
            <p>依照 SOP 的 Phase 節奏與每日欄目，生成貼文、互動題、回覆腳本與追蹤指標。</p>
          </div>
        </section>

        <form class="controls" id="postForm">
          <div class="section">
            <p class="section-title">營運階段</p>
            <div class="segmented" role="tablist" aria-label="營運階段">
              <button type="button" data-phase="phase1" class="active">拉新</button>
              <button type="button" data-phase="phase2">養熟</button>
              <button type="button" data-phase="phase3">轉化</button>
            </div>
          </div>

          <div class="section">
            <p class="section-title">基本設定</p>
            <div class="two-col">
              <div class="field">
                <label for="postDate">發文日期</label>
                <input type="date" id="postDate">
              </div>
              <div class="field">
                <label for="postTime">發文時間</label>
                <select id="postTime">
                  <option value="12:00">12:00 中午</option>
                  <option value="10:00">10:00 早上</option>
                  <option value="18:00">18:00 傍晚</option>
                  <option value="21:30">21:30 晚間</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="audience">主要受眾</label>
              <select id="audience">
                <option value="family">親子家庭</option>
                <option value="couple">情侶約會</option>
                <option value="school">學校 / 安親班</option>
                <option value="company">企業家庭日 / 團體活動</option>
                <option value="local">在地社群 / 附近居民</option>
                <option value="member">LINE 舊會員</option>
              </select>
            </div>

            <div class="field">
              <label for="theme">每日欄目</label>
              <select id="theme">
                <option value="auto">依階段自動建議</option>
                <option value="weekly">本週亮點整理</option>
                <option value="story">顧客故事 / 場景文</option>
                <option value="poll">A/B/C/D 互動投票</option>
                <option value="proof">口碑見證 / 體驗回饋</option>
                <option value="guide">遊玩攻略 / 小提醒</option>
                <option value="live">現場活動提醒</option>
                <option value="member">會員回訪任務</option>
                <option value="flash">快閃活動公告</option>
              </select>
            </div>
          </div>

          <div class="section">
            <p class="section-title">今日素材</p>
            <div class="field">
              <label for="activity">主打活動 / 商品</label>
              <input id="activity">
            </div>
            <div class="field">
              <label for="offer">今天要帶出的誘因</label>
              <input id="offer">
            </div>
            <div class="field">
              <label for="link">連結或行動方式</label>
              <input id="link">
            </div>
            <div class="field">
              <label for="extra">補充資訊</label>
              <textarea id="extra"></textarea>
            </div>
          </div>

          <div class="section">
            <p class="section-title">貼文語氣</p>
            <div class="chip-row" id="toneGroup" aria-label="選擇貼文語氣">
              <button type="button" data-tone="warm" class="active">溫暖親切</button>
              <button type="button" data-tone="expert">專業清楚</button>
              <button type="button" data-tone="playful">活潑互動</button>
              <button type="button" data-tone="urgent">限時提醒</button>
            </div>
          </div>

          <div class="section">
            <button type="submit" class="action-btn" style="width:100%;">生成今日貼文</button>
          </div>
        </form>

        <article class="panel control-strategy">
          <div class="panel-head">
            <h3>策略提醒</h3>
          </div>
          <div class="insight-list" id="insights"></div>
        </article>
      </aside>

      <section class="workspace">
        <div class="status-strip" id="statusStrip" aria-label="貼文摘要"></div>

        <div class="output-layout">
          <article class="panel">
            <div class="panel-head">
              <h2>LINE 貼文預覽</h2>
              <div class="panel-actions">
                <button class="mini-btn" id="copyBtn">複製</button>
                <button class="mini-btn" id="saveBtn">存入紀錄</button>
                <button class="mini-btn" id="downloadBtn">下載 TXT</button>
              </div>
            </div>
            <div class="post-preview" id="postPreview">
              <p class="empty">選擇欄目或調整素材後，這裡會即時產出可貼到 LINE 社群的貼文。</p>
            </div>
          </article>

          <aside class="side-stack">
            <article class="panel">
              <div class="panel-head">
                <h3>LINE 手機泡泡預覽</h3>
              </div>
              <div class="phone-preview-wrap">
                <div class="phone-preview-title">
                  <span>歐樂沃夢幻城堡</span>
                  <span id="phonePreviewTime">12:00</span>
                </div>
                <div class="phone-preview" aria-label="LINE 手機泡泡預覽">
                  <div class="phone-preview-bar">
                    <span>歐樂沃夢幻城堡</span>
                    <span>LINE</span>
                  </div>
                  <div class="phone-preview-body">
                    <div class="line-bubble-preview" id="lineBubblePreview"></div>
                  </div>
                </div>
                <div class="sensitive-list" id="sensitiveList"></div>
              </div>
            </article>

            <article class="panel" style="margin-top:18px;">
              <div class="panel-head">
                <h3>產出紀錄</h3>
                <button class="mini-btn" id="clearHistoryBtn">清空</button>
              </div>
              <div class="history-list" id="historyList"></div>
            </article>
          </aside>
        </div>

      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    const state = {
      phase: "phase1",
      tone: "warm",
      currentPost: "",
      currentMeta: null,
      filteredWords: []
    };

    const phaseData = {
      phase1: {
        label: "Phase 1 拉新",
        intent: "讓陌生受眾知道歐樂沃適合安排親子、約會或團體活動",
        kpi: "新好友加入、留言互動、活動清單索取",
        cta: "用低門檻互動讓對方先留言或索取資訊"
      },
      phase2: {
        label: "Phase 2 養熟",
        intent: "建立信任感與期待感，讓成員更熟悉場域特色",
        kpi: "點擊、收藏、回覆、二次互動",
        cta: "用故事、攻略、回饋與提醒提高下一步意願"
      },
      phase3: {
        label: "Phase 3 轉化",
        intent: "推動預約、報名、保留名額或回訪",
        kpi: "私訊、預約、名額確認、到店轉換",
        cta: "把行動方式說清楚，讓成員可以立即回覆"
      }
    };

    const audiences = {
      family: {
        label: "親子家庭",
        address: "爸媽們",
        desire: "不用怕下雨、不用臨時找行程，孩子也能好好放電",
        product: "親子入場體驗 + 城堡拍照點 + 互動任務",
        strategy: "主打爸媽省心、孩子放電、雨天也能安排。",
        contentAngle: "用「週末備案」和「親子照片」切入，降低家長決策成本。",
        kpiFocus: "留言索取清單、親子標籤留言、收藏數"
      },
      couple: {
        label: "情侶約會",
        address: "想安排特別約會的你",
        desire: "不只吃飯看電影，也能留下有記憶點的照片",
        product: "城堡場景拍照 + 約會散步路線",
        strategy: "主打拍照打卡、約會新鮮感與共同回憶。",
        contentAngle: "用「不只是吃飯看電影」切入，讓城堡變成約會提案。",
        kpiFocus: "標記另一半、私訊詢問、拍照點收藏"

    function init() {
      $("#postDate").value = toDateInput(new Date());
      bindEvents();
      applyThemeDefaults(true);
      generatePost();
      renderHistory();
      registerServiceWorker();
    }

    function bindEvents() {
      $$(".segmented button").forEach((button) => {
        button.addEventListener("click", () => {
          state.phase = button.dataset.phase;
          $$(".segmented button").forEach((item) => item.classList.toggle("active", item === button));
          if ($("#theme").value === "auto") applyThemeDefaults(true);
          generatePost();
        });
      });

      $("#toneGroup").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-tone]");
        if (!button) return;
        state.tone = button.dataset.tone;
        $$("#toneGroup button").forEach((item) => item.classList.toggle("active", item === button));
        generatePost();
      });

      $("#theme").addEventListener("change", () => {
        applyThemeDefaults(true);
        generatePost();
      });

      ["postDate", "postTime", "audience", "activity", "offer", "link", "extra"].forEach((id) => {
        $("#" + id).addEventListener("input", generatePost);
        $("#" + id).addEventListener("change", generatePost);
      });

      $("#postForm").addEventListener("submit", (event) => {
        event.preventDefault();
        generatePost(true);
      });

      $("#copyBtn").addEventListener("click", copyPost);
      $("#saveBtn").addEventListener("click", saveCurrentPost);
      $("#downloadBtn").addEventListener("click", downloadPost);
      $("#clearHistoryBtn").addEventListener("click", clearHistory);
      $("#resetBtn").addEventListener("click", resetFields);

      let deferredPrompt = null;
      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredPrompt = event;
        $("#installBtn").hidden = false;
      });
      $("#installBtn").addEventListener("click", async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        $("#installBtn").hidden = true;
      });
    }

    function getEffectiveThemeKey() {
      if ($("#theme").value !== "auto") return $("#theme").value;
      if (state.phase === "phase1") return "poll";
      if (state.phase === "phase2") return "guide";
      return "flash";
    }

    function applyThemeDefaults(force = false) {
      const defaults = themeDefaults[getEffectiveThemeKey()] || themeDefaults.weekly;
      if (force) {
        $("#activity").value = defaults.activity;
        $("#offer").value = defaults.offer;
        $("#link").value = defaults.link;
      }
      $("#extra").placeholder = defaults.extraPlaceholder;
    }

    function resetFields() {
      applyThemeDefaults(true);
      $("#extra").value = "";
      generatePost();
      showToast("已依每日欄目重設提示");
    }

    function generatePost(fromButton = false) {
      const meta = collectMeta();
      const result = filterSensitiveWords(buildPost(meta));
      state.currentMeta = meta;
      state.currentPost = result.text;
      state.filteredWords = result.filtered;
      $("#postPreview").textContent = state.currentPost;
      $("#lineBubblePreview").textContent = state.currentPost;
      $("#phonePreviewTime").textContent = meta.time;
      renderStatus(meta);
      renderInsights(meta);
      renderSensitiveList();
      if (fromButton) showToast("已生成今日貼文");
    }

    function collectMeta() {
      const themeKey = getEffectiveThemeKey();
      const theme = themes[themeKey] || themes.weekly;
      const audience = audiences[$("#audience").value];
      const date = parseInputDate($("#postDate").value);
      return {
        phase: phaseData[state.phase],
        phaseKey: state.phase,
        themeKey,
        theme,
        audience,
        tone: tones[state.tone],
        dateLabel: formatDate(date),
        time: $("#postTime").value,
        activity: clean($("#activity").value),
        offer: clean($("#offer").value),
        link: clean($("#link").value),
        extra: clean($("#extra").value)
      };
    }

    function buildPost(meta) {
      const tone = meta.tone;
      const openingEmoji = meta.themeKey === "flash" ? "🔥" : meta.themeKey === "poll" ? "🗳️" : tone.emoji;
      const toneLine = buildToneLine(meta);
      const interaction = buildInteraction(meta);
      const lines = [
        `【${meta.dateLabel} ${meta.time}｜${meta.theme.label}】`,
        "",
        `${openingEmoji} ${meta.audience.address}，${tone.openerPrefix}：${meta.theme.opener}。`,
        "",
        `今天主打：${meta.activity}`,
        `適合對象：${meta.audience.label}`,
        `你會在意的是：${meta.audience.desire}`,
        "",
        `${tone.emoji} ${tone.bulletLead}`,
        `1. ${meta.offer}`,
        `2. ${meta.audience.product}`,
        `3. ${phaseSpecificLine(meta)}`,
        "",
        toneLine,
        "",
        `${tone.ctaLead}，${interaction}`,
        meta.extra ? `\n補充提醒：${meta.extra}` : "",
        "",
        meta.theme.hashtags.join(" ")
      ];

      return lines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
    }

    function buildToneLine(meta) {
      if (meta.tone === tones.warm) {
        return "小編提醒：先不用把行程排得很滿，選一個孩子會期待、爸媽也輕鬆的安排就很好。";
      }
      if (meta.tone === tones.expert) {
        return "資訊整理：建議先確認日期、適合年齡、活動內容與名額，再安排後續預約。";
      }
      if (meta.tone === tones.playful) {
        return "互動任務：看完這則先選一個你最想體驗的項目，讓小編知道你偏好哪一種。";
      }
      return "限時提醒：如果你本週就想安排，建議先留言確認，避免名額或場次額滿。";
    }

    function phaseSpecificLine(meta) {
      if (meta.phaseKey === "phase1") return "先用低門檻互動，讓新朋友願意留言。";
      if (meta.phaseKey === "phase2") return "用實用資訊與場景感，讓成員更熟悉城堡。";
      return "把行動方式講清楚，讓想參加的人可以立即回覆。";
    }

    function buildInteraction(meta) {
      if (meta.themeKey === "poll") {
        return `請直接留言 A/B/C/D：\nA 親子 DIY\nB 拍照打卡\nC 生日派對\nD 雨天備案\n\n${meta.link}`;
      }
      return meta.link;
    }

    function filterSensitiveWords(text) {
      const filtered = [];
      let output = text;
      sensitiveRules.forEach((rule) => {
        if (output.includes(rule.word)) {
          filtered.push(rule);
          output = output.split(rule.word).join(rule.replacement);
        }
      });
      return { text: output, filtered };
    }

    function renderSensitiveList() {
      if (!state.filteredWords.length) {
        $("#sensitiveList").innerHTML = `<div class="note blue"><strong>敏感詞檢查</strong>目前沒有需要替換的 LINE 敏感詞。</div>`;
        return;
      }
      $("#sensitiveList").innerHTML = state.filteredWords.map((item) => `
        <div class="note">
          <strong>敏感詞已替換</strong>
          已將「${escapeHtml(item.word)}」替換為「${escapeHtml(item.replacement)}」。
        </div>
      `).join("");
    }

    function renderStatus(meta) {
      const items = [
        [meta.phase.label, "營運階段"],
        [meta.theme.label, "每日欄目"],
        [meta.audience.label, "主要受眾"],
        [meta.tone.label, "貼文語氣"]
      ];
      $("#statusStrip").innerHTML = items.map(([value, label]) => `
        <div class="metric">
          <b>${escapeHtml(value)}</b>
          <span>${escapeHtml(label)}</span>
        </div>
      `).join("");
    }

    function renderInsights(meta) {
      const items = [
        ["今日目的", `${meta.phase.intent}。欄目目的：${meta.theme.purpose}。`, ""],
        ["受眾切角", `${meta.audience.label}：${meta.audience.strategy} ${meta.audience.contentAngle}`, "blue"],
        ["語氣策略", `${meta.tone.label}：${meta.tone.summary}。`, "purple"],
        ["互動設計", `建議引導方式：${meta.theme.interaction}。`, ""],
        ["追蹤指標", `優先看：${meta.audience.kpiFocus}。階段指標：${meta.phase.kpi}。`, "blue"]
      ];
      $("#insights").innerHTML = items.map(([title, body, type]) => `
        <div class="note ${type}">
          <strong>${escapeHtml(title)}</strong>
          ${escapeHtml(body)}
        </div>
      `).join("");
    }

    async function copyPost() {
      if (!state.currentPost) return;
      try {
        await navigator.clipboard.writeText(state.currentPost);
      } catch (error) {
        fallbackCopy(state.currentPost);
      }
      showToast("已複製貼文");
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }

    function saveCurrentPost() {
      const history = loadHistory();
      history.unshift({
        id: Date.now(),
        title: `${state.currentMeta.dateLabel} ${state.currentMeta.theme.label}`,
        preview: state.currentPost.slice(0, 72),
        content: state.currentPost
      });
      localStorage.setItem("olivo-line-post-history", JSON.stringify(history.slice(0, 20)));
      renderHistory();
      showToast("已存入紀錄");
    }

    function renderHistory() {
      const history = loadHistory();
      if (!history.length) {
        $("#historyList").innerHTML = `<div class="note blue">尚無產出紀錄。</div>`;
        return;
      }
      $("#historyList").innerHTML = history.map((item) => `
        <button class="history-item" type="button" data-id="${item.id}">
          <b>${escapeHtml(item.title)}</b>
          <span>${escapeHtml(item.preview)}...</span>
        </button>
      `).join("");
      $$(".history-item").forEach((button) => {
        button.addEventListener("click", () => {
          const item = history.find((entry) => String(entry.id) === button.dataset.id);
          if (!item) return;
          state.currentPost = item.content;
          $("#postPreview").textContent = item.content;
          $("#lineBubblePreview").textContent = item.content;
          state.filteredWords = [];
          renderSensitiveList();
          showToast("已載入紀錄");
        });
      });
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem("olivo-line-post-history") || "[]");
      } catch (error) {
        return [];
      }
    }

    function clearHistory() {
      localStorage.removeItem("olivo-line-post-history");
      renderHistory();
      showToast("已清空紀錄");
    }

    function downloadPost() {
      const blob = new Blob([state.currentPost], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `olivo-line-post-${$("#postDate").value || "today"}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function parseInputDate(value) {
      const fallback = new Date();
      if (!value) return fallback;
      const parsed = new Date(`${value}T00:00:00`);
      return Number.isNaN(parsed.getTime()) ? fallback : parsed;
    }

    function toDateInput(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDate(date) {
      return `${date.getMonth() + 1}/${date.getDate()}（${"日一二三四五六"[date.getDay()]}）`;
    }

    function clean(value) {
      return String(value || "").trim().replace(/\s+/g, " ");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function registerServiceWorker() {
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }
    }

    init();
  </script>
</body>
</html>
